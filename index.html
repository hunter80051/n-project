<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>35 秒點擊遊戲</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game">
    <h1>35 秒點擊遊戲</h1>
    <div class="stats" aria-live="polite">
      <p>分數：<strong id="score">0</strong></p>
      <p>剩餘時間：<strong id="time">35</strong> 秒</p>
    </div>
    <p id="message">按下開始後，盡快點擊圓形目標！</p>
    <div id="arena" class="arena" aria-label="遊戲區">
      <button id="target" class="target" type="button" aria-label="點擊目標" disabled></button>
    </div>
    <button id="start-button" class="start-button" type="button">開始遊戲</button>
  </main>
  <script src="script.js"></script>
</body>
</html>
